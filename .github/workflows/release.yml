name: Release

on:
  # Tag push → automatic upload to internal track.
  push:
    tags:
      - "v*"
  # Manual trigger → choose a track other than internal (useful for
  # promoting a tested AAB to alpha / beta / production from CI rather
  # than the Play Console UI). The `track` input is wired through to
  # the gradle-play-publisher task in app/build.gradle.kts.
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes:
        description: "Release notes (overrides app/src/main/play/release-notes/)"
        required: false
        type: string

# Only one release in flight per ref so a quick double-tag doesn't
# upload two AABs that race on the Play Console.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build AAB + upload to Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # All the secrets that the release path needs. Documented in
    # docs/PLAY_STORE.md — until you fill them in, this workflow is a
    # no-op (it fails fast at the keystore-decode step with a clear
    # message so it's obvious WHAT is missing).
    env:
      RELEASE_KEYSTORE_PATH:        ${{ github.workspace }}/release.keystore
      RELEASE_KEYSTORE_PASSWORD:    ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS:            ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD:         ${{ secrets.RELEASE_KEY_PASSWORD }}
      PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/play-service-account.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gradle-play-publisher can attach the last commit message as
          # release notes when no override file exists. Need full history
          # for that to find the merge commit on the tag.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: true

      # ── Derive versionCode + versionName from the tag ──────────────────
      # v1.2.3 → versionCode 10203, versionName "1.2.3". The 5-digit
      # encoding leaves room for patch numbers up to 99 without ever
      # going backwards on a minor bump (1.2.99 = 10299, 1.3.0 = 10300).
      # Manual workflow_dispatch runs (no tag) use the date as code so
      # they can still be uploaded without colliding with tagged releases.
      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
            MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
            CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
            NAME="$TAG"
          else
            # Manual dispatch on a branch — use a date-based code that's
            # higher than any plausible semver (year-month-day in YYMMDD
            # fits in an int and is monotonic). Mark the name accordingly.
            CODE=$(date -u +%y%m%d)
            NAME="0.0.0-manual-$(date -u +%Y%m%d-%H%M)"
          fi
          echo "code=$CODE"  >> "$GITHUB_OUTPUT"
          echo "name=$NAME"  >> "$GITHUB_OUTPUT"
          echo "Computed VERSION_CODE=$CODE VERSION_NAME=$NAME"

      # ── Decode the keystore + service-account JSON from base64 secrets ─
      # The secrets are stored base64-encoded in GitHub because the raw
      # binary doesn't survive the "secret" UI cleanly. We write them
      # into the workspace and trust that runner isolation keeps them
      # private; nothing else has access to the filesystem.
      - name: Decode release keystore
        run: |
          if [[ -z "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret not set."
            echo "See docs/PLAY_STORE.md for setup instructions."
            exit 1
          fi
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "${RELEASE_KEYSTORE_PATH}"
          # Sanity-check the file is a valid keystore (jks/pkcs12). keytool
          # exits non-zero if the password or file is wrong, which surfaces
          # the misconfig early instead of much later inside Gradle.
          keytool -list -keystore "${RELEASE_KEYSTORE_PATH}" \
            -storepass "${RELEASE_KEYSTORE_PASSWORD}" >/dev/null

      - name: Decode Play service-account JSON
        run: |
          if [[ -z "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" ]]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON_BASE64 secret not set."
            echo "See docs/PLAY_STORE.md for setup instructions."
            exit 1
          fi
          echo "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > "${PLAY_SERVICE_ACCOUNT_JSON_PATH}"
          # Validate it's parseable JSON — saves a confusing Gradle error
          # if someone pastes the base64 wrong.
          jq -e . "${PLAY_SERVICE_ACCOUNT_JSON_PATH}" >/dev/null

      # ── Build + upload ────────────────────────────────────────────────
      - name: Generate OpenAPI client
        run: gradle :app:openApiGenerate --no-daemon --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      - name: Run unit tests
        run: gradle :app:testReleaseUnitTest --no-daemon --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      - name: Bundle signed AAB
        run: gradle :app:bundleRelease --no-daemon --stacktrace
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}

      # Publishes the AAB to the chosen track. `publishReleaseBundle` is
      # gradle-play-publisher's task name; it also handles draft state +
      # release notes (auto-picked from app/src/main/play/release-notes/
      # if the override input is empty).
      - name: Upload to Play Store
        run: |
          gradle :app:publishReleaseBundle \
            --no-daemon --stacktrace \
            --track "${TRACK}"
        env:
          TRACK:                        ${{ github.event.inputs.track || 'internal' }}
          VERSION_CODE:                 ${{ steps.version.outputs.code }}
          VERSION_NAME:                 ${{ steps.version.outputs.name }}

      # ── Artifacts ─────────────────────────────────────────────────────
      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ steps.version.outputs.name }}
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 90

      - name: Upload mapping.txt (R8/ProGuard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.name }}
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 90

      # Always shred the credentials at the end. Runners are
      # ephemeral but defence-in-depth is cheap.
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "${RELEASE_KEYSTORE_PATH}" "${PLAY_SERVICE_ACCOUNT_JSON_PATH}"
