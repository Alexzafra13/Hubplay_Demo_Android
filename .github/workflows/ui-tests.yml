name: UI tests (emulator)

# Instrumented Compose UI tests on an Android TV emulator. Kept SEPARATE
# from ci.yml on purpose:
#   - It's slow (emulator boot ~3-5 min) and burns more free-tier minutes.
#   - It is NOT a merge gate yet — the suite is a single launch smoke test
#     and the emulator matrix (api-level/target/arch) may need tuning on the
#     first real run.
#
# Manually triggered for now. Once it's green a couple of times, flip the
# trigger to `push` on `claude/**` + `main` to make it a real gate, and grow
# the suite (add testTags to composables, then Login→Home→Play with a test
# backend or DI doubles).
on:
  workflow_dispatch:

# Don't pile up emulator runs on rapid re-dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: Compose UI tests · Android TV emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Compilation depends on the generated OpenAPI client (same as ci.yml).
      - name: Generate OpenAPI client
        run: gradle :app:openApiGenerate --no-daemon --stacktrace

      # The emulator needs hardware acceleration; ubuntu-latest exposes KVM
      # but the runner user needs access to /dev/kvm.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # reactivecircus/android-emulator-runner spins up the AVD, waits for
      # boot, then runs `script`. Android TV image so the D-pad/leanback
      # focus model matches the real target.
      - name: Run Compose UI tests on Android TV emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: android-tv
          arch: x86
          profile: tv_1080p
          # If `android-tv` images are unavailable for this api-level/arch on
          # the runner, fall back to: target: google_apis, profile: tv_1080p.
          script: gradle :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload androidTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 7
