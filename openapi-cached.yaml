# HubPlay API — OpenAPI 3.0.3 spec.
#
# Scope (v1 of the spec):
#
#   ✓ Auth (login, refresh, logout, RFC 8628 device-code flow)
#   ✓ Identity (/me, /me/preferences)
#   ✓ Browse (libraries, items, search, latest)
#   ✓ Stream (HLS waterfall + direct-play + subtitles)
#   ✓ User data (progress, played, favourites, continue-watching, next-up)
#   ✓ User-scoped real-time events (SSE)
#   ✓ People (cast/crew detail + thumbnails)
#   ✓ Image serving
#   ✓ Trickplay (seek-bar previews)
#   ✓ Federation user surface (browse paired peers' shared libraries)
#   ✓ Live TV (channels, EPG schedule, favourites, continue-watching,
#     transmuxed HLS playback)
#   ✓ Home (per-user layout + trending + live-now rails)
#   ✓ Health, OpenAPI self-description
#
# Out of scope (intentional, not "TODO"):
#
#   ✗ Admin endpoints (/admin/*, library mutations, user management,
#     provider config, federation pairing, IPTV admin operations like
#     M3U/EPG refresh, channel health management, scheduled jobs).
#     A native client doesn't run admin flows.
#   ✗ Setup wizard (/setup/*). Web-only first-run flow.
#   ✗ Peer-to-peer endpoints (/peer/*). Server-to-server, authenticated
#     by Ed25519-signed JWTs from a paired peer's keypair, not by user
#     sessions. Documented separately in docs/architecture/federation.md.
#
# Drift detection: a Go test (internal/api/openapi_drift_test.go) walks
# the chi router AST and fails CI if a handler is registered without a
# matching spec entry (or vice versa). Out-of-scope routes are listed
# explicitly in that test with one-line justifications.
#
# Format: OpenAPI 3.0.3 chosen over 3.1 for broader Kotlin tooling
# compatibility (openapi-generator's Kotlin templates lag on 3.1).
# The trade-off is JSON Schema draft-04-ish constraints; not a blocker
# for what the API expresses.
#
# Authoritative source: this file. The spec is embedded into the binary
# via //go:embed and served at /api/v1/openapi.yaml. Updates here ship
# with the next build.

openapi: 3.0.3

info:
  title: HubPlay API
  description: |
    Self-hosted media server REST API. Powers the React web client, the
    Kotlin Android TV client, and any third-party integration that wants
    to browse a HubPlay catalogue or stream from one.

    ## Authentication

    Two auth flows:

    1. **Password (`/auth/login`)** — Username + password → JWT pair
       (access + refresh). Used by the web client.
    2. **Device code (`/auth/device/*`, RFC 8628)** — TV remotes can't
       type passwords. The device asks the server for a short user code,
       displays it, and polls. The operator approves the code on a
       logged-in browser. Used by the Kotlin TV client and any headless
       client.

    Both produce JWT pairs that are **indistinguishable** thereafter —
    same access-token shape, same refresh path.

    ## Wire format

    All JSON responses are envelope-shaped:

    - **Success**: `{ "data": <payload> }`
    - **Error**: `{ "error": { "code", "message", "hint?", "details?", "request_id" } }`

    The `request_id` correlates server logs; the `code` is a stable
    machine-readable identifier (e.g. `INVALID_CREDENTIALS`,
    `PEER_RATE_LIMITED`); the `message` is human-readable English. Some
    error codes adopt RFC-spec lowercase (e.g. `authorization_pending`
    from RFC 8628). Match on `code` programmatically, surface `message`
    to users via your client's i18n.

    ## Streaming (HLS)

    `/stream/{itemId}/master.m3u8` is the entry point. Send the
    `X-Hubplay-Client-Capabilities` header to declare what your decoder
    supports — the server picks the best of DirectPlay, DirectStream
    (remux), or Transcode based on what you can natively decode.

    Header format mirrors `Accept-CH`/`Vary`:
    ```
    X-Hubplay-Client-Capabilities: video=h264,hevc,av1; audio=aac,eac3,opus; container=mp4,mkv
    ```

    Header absent → conservative web-browser defaults (h264/aac/mp4).

  version: 0.1.0
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: /api/v1
    description: Same-origin (recommended)
  - url: https://hubplay.example.com/api/v1
    description: Example production deployment

tags:
  - name: auth
    description: Login, token refresh, device-code flow
  - name: identity
    description: Current user info and preferences
  - name: browse
    description: Libraries and items catalog
  - name: stream
    description: Playback (HLS, direct play, subtitles, trickplay)
  - name: user-data
    description: Watch progress, played state, favourites, continue-watching
  - name: events
    description: Server-Sent Events for cross-device sync
  - name: people
    description: Cast and crew
  - name: images
    description: Poster/backdrop/thumbnail serving
  - name: federation
    description: Browse content from paired peer servers
  - name: livetv
    description: IPTV channel browse, EPG, favourites, transmuxed HLS playback
  - name: home
    description: Per-user home layout + discovery rails (trending, live-now)
  - name: health
    description: Liveness probe
  - name: meta
    description: OpenAPI spec self-description

paths:
  # ────────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns OK when the process is up. Always public.
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ─── Auth ───────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [auth]
      summary: Sign in with username + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Account disabled or rate-limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a fresh access+refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: |
                    Optional — if omitted the server revokes whichever
                    session matches the access token's `device_id` claim.
      responses:
        "204":
          description: Logged out

  /auth/device/start:
    post:
      tags: [auth]
      summary: Start a device authorization flow (RFC 8628)
      description: |
        Used by headless clients (TVs, consoles, CLI tools) that can't
        present a password form. The server issues a short `user_code`
        the device displays, plus an opaque `device_code` the device
        keeps secret and polls with.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                device_name:
                  type: string
                  description: Friendly label shown in the user's session list
                  example: "Living-room TV"
      responses:
        "201":
          description: Code pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStartEnvelope"

  /auth/device/poll:
    post:
      tags: [auth]
      summary: Poll for token issuance (RFC 8628)
      description: |
        Recommended polling interval is `interval` seconds from the
        start response. If you receive `slow_down`, add 5s to your
        interval per RFC 8628 §3.5.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_code]
              properties:
                device_code: { type: string }
      responses:
        "200":
          description: Approved — tokens issued (single-use; subsequent polls return `expired_token`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenEnvelope"
        "400":
          description: Protocol error (still polling)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                pending:
                  summary: Operator hasn't approved yet
                  value: { error: { code: authorization_pending, message: "the user has not yet approved the device" } }
                slowDown:
                  summary: Polling too aggressively
                  value: { error: { code: slow_down, message: "polling too frequently; back off and retry" } }
                expired:
                  summary: Code expired or already redeemed
                  value: { error: { code: expired_token, message: "the device code has expired or already been used" } }

  /auth/device/approve:
    post:
      tags: [auth]
      summary: Approve a pending device code (operator-side)
      description: |
        Called from the `/link` page after the operator types the code
        from their device. Authenticated; the calling user is the one
        the device's session will run as.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
                  example: "ABCD-EFGH"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      approved: { type: boolean }
        "404":
          description: User code unknown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already approved by a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "410":
          description: Code expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ─── Identity ───────────────────────────────────────────────────────
  /me:
    get:
      tags: [identity]
      summary: Current user
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"

  /me/preferences:
    get:
      tags: [identity]
      summary: List user preferences
      description: |
        Per-user key/value preferences. Free-form keys for now; clients
        SHOULD namespace their own preferences to avoid collisions
        (e.g. `tv.hero_mode`, `web.theme`).
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        value: { type: string }
                        updated_at: { type: string, format: date-time }

  /me/preferences/{key}:
    parameters:
      - { name: key, in: path, required: true, schema: { type: string } }
    put:
      tags: [identity]
      summary: Set a preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string }
      responses: { "204": { description: Saved } }
    delete:
      tags: [identity]
      summary: Delete a preference
      responses: { "204": { description: Deleted } }

  # ─── Events (SSE) ───────────────────────────────────────────────────
  /me/events:
    get:
      tags: [events]
      summary: User-scoped Server-Sent Events stream
      description: |
        Long-lived `text/event-stream`. Server filters by user_id BEFORE
        the channel write — a slow client of user A never blocks events
        for user B. Three event types:

        - `user.progress.updated` — watch progress changed (any device)
        - `user.played.toggled` — played/unplayed state changed
        - `user.favorite.toggled` — favourite state changed

        Each event's `data` is JSON with `user_id`, `item_id`, and
        type-specific fields. Connection uses HTTP keepalive comments
        every 30s to defeat reverse-proxy timeouts.

        Client behaviour: subscribe once at app start, invalidate the
        relevant local cache (e.g. `/items/{id}`, continue-watching) on
        each event. `EventSource` handles reconnection with exponential
        backoff automatically.
      responses:
        "200":
          description: Event stream (long-lived)
          content:
            text/event-stream:
              schema:
                type: string

  # ─── Browse ─────────────────────────────────────────────────────────
  /libraries:
    get:
      tags: [browse]
      summary: List libraries the calling user can access
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Library" }

  /libraries/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [browse]
      summary: Library detail
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Library" }
        "404": { $ref: "#/components/responses/NotFound" }

  /libraries/{id}/items:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: offset, in: query, schema: { type: integer, default: 0 } }
      - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      - { name: sort, in: query, schema: { type: string, enum: [title, year, added_at, rating] } }
      - { name: type, in: query, schema: { type: string, enum: [movie, series, episode] } }
      - { name: genre, in: query, schema: { type: string } }
      - { name: year, in: query, schema: { type: integer } }
      - { name: rating_min, in: query, schema: { type: number, format: float } }
    get:
      tags: [browse]
      summary: Paginated items in a library, with filters
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedItemsEnvelope"

  /items:
    get:
      tags: [browse]
      summary: Paginated items across every library, with filters
      description: |
        Same payload shape as `/libraries/{id}/items` but spans every library.
        Used by the global browse pages (`/movies`, `/series`) which don't
        scope by library.
      parameters:
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: sort_by, in: query, schema: { type: string, enum: [sort_title, added_at, year] } }
        - { name: sort_order, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: type, in: query, schema: { type: string, enum: [movie, series, episode] } }
        - { name: parent_id, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: string } }
        - name: q
          in: query
          description: Full-text search query. Server-side FTS over titles + cast/crew.
          schema: { type: string }
        - name: genre
          in: query
          description: Genre name (case-insensitive, exact match against the normalized tag store).
          schema: { type: string }
        - name: year_from
          in: query
          description: Inclusive lower year bound. Items with no year are excluded when set.
          schema: { type: integer, minimum: 1800 }
        - name: year_to
          in: query
          description: Inclusive upper year bound. Items with no year are excluded when set.
          schema: { type: integer, minimum: 1800 }
        - name: min_rating
          in: query
          description: Inclusive minimum community_rating (0..10). Items without a rating are excluded when set.
          schema: { type: number, format: float, minimum: 0, maximum: 10 }
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedItemsEnvelope"

  /items/{id}/recommendations:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [browse]
      summary: 'More-like-this suggestions for the given item'
      description: |
        Calls the metadata provider's recommendations endpoint (TMDb's
        `/movie/{id}/recommendations` or `/tv/{id}/recommendations`)
        and cross-references each candidate against the local library.
        Each entry is marked `in_library: true` with a `local_id` deep
        link when the user already has it. 503 when no provider is
        configured. Empty list when the item has no TMDb match.
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            tmdb_id: { type: string }
                            title: { type: string }
                            year: { type: integer }
                            overview: { type: string }
                            poster_url: { type: string }
                            rating: { type: number, format: float }
                            in_library: { type: boolean }
                            local_id: { type: string }

  /items/genres:
    get:
      tags: [browse]
      summary: Catalogue-wide genre vocabulary for the filter panel
      description: |
        Returns every genre that has at least one item, with the
        item count, ordered by frequency desc. Scope to movies or
        series with the optional `type` parameter so unrelated genres
        don't bleed across pages.
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [movie, series, episode] } }
      responses:
        "200":
          description: Genre vocabulary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:  { type: string }
                        count: { type: integer }

  /items/latest:
    get:
      tags: [browse]
      summary: Recently added across visible libraries
      description: |
        Default ordering is `added_at DESC` over every item in the
        library. When the caller scopes to a single shows library
        with `type=series`, the response is instead ordered by recent
        activity (max `added_at` over the series and any of its
        episodes), and each entry carries an extra
        `new_episodes_count` (episodes added in the last 14 days)
        plus `latest_activity_at` so the rail can render a "+N
        nuevos episodios" hint. Movies / mixed / global queries
        keep the simple ordering.
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
        - { name: library_id, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string, enum: [movie, series, season, episode] } }
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ItemSummary" }

  /items/search:
    get:
      tags: [browse]
      summary: Full-text search across item titles + people
      description: |
        Returns the same item shape as `/items` but always FTS-keyed.
        Mirrors the filter surface of `/items` so MediaBrowse can keep
        genre/year/rating active while typing a query — server-side so
        the result set is correct beyond the loaded page.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: library_id, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string, enum: [movie, series, episode] } }
        - { name: genre, in: query, schema: { type: string } }
        - { name: year_from, in: query, schema: { type: integer, minimum: 1800 } }
        - { name: year_to, in: query, schema: { type: integer, minimum: 1800 } }
        - { name: min_rating, in: query, schema: { type: number, format: float, minimum: 0, maximum: 10 } }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ItemSummary" }
                  total: { type: integer }

  /items/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [browse]
      summary: Full item detail (metadata, streams, cast, images)
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ItemDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /items/{id}/children:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [browse]
      summary: Children of an item (seasons of a series, episodes of a season)
      responses:
        "200":
          description: Children
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ItemSummary" }

  /items/{id}/trickplay.json:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: Trickplay sprite manifest (lazy-generated on first request)
      responses:
        "200":
          description: Trickplay manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      width: { type: integer }
                      height: { type: integer }
                      tile_width: { type: integer }
                      tile_height: { type: integer }
                      thumb_count: { type: integer }
                      interval_ms: { type: integer }

  /items/{id}/trickplay.png:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: Trickplay sprite sheet
      responses:
        "200":
          description: Sprite PNG
          content:
            image/png:
              schema: { type: string, format: binary }

  # ─── Stream ─────────────────────────────────────────────────────────
  /stream/{itemId}/info:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: Pre-flight stream info — picks the playback strategy
      description: |
        Sends back the master playlist URL plus the strategy decided
        (`direct_play` / `direct_stream` / `transcode`). The decision
        honours the `X-Hubplay-Client-Capabilities` header — declare
        what your decoder supports for best fidelity.
      parameters:
        - $ref: "#/components/parameters/ClientCapabilitiesHeader"
      responses:
        "200":
          description: Stream info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/StreamInfo" }

  /stream/{itemId}/master.m3u8:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: HLS master playlist
      parameters:
        - $ref: "#/components/parameters/ClientCapabilitiesHeader"
      responses:
        "200":
          description: HLS master playlist
          content:
            application/vnd.apple.mpegurl:
              schema: { type: string }

  /stream/{itemId}/{quality}/index.m3u8:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - { name: quality, in: path, required: true, schema: { type: string }, description: "Variant identifier (e.g. `1080p`, `720p`)" }
    get:
      tags: [stream]
      summary: HLS variant playlist
      responses:
        "200":
          description: Variant playlist
          content:
            application/vnd.apple.mpegurl:
              schema: { type: string }

  /stream/{itemId}/{quality}/{segment}:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - { name: quality, in: path, required: true, schema: { type: string } }
      - { name: segment, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: HLS segment
      responses:
        "200":
          description: Transport stream segment
          content:
            video/mp2t:
              schema: { type: string, format: binary }

  /stream/{itemId}/direct:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: Direct-play original file (Range requests supported)
      description: |
        For clients with native containers/codecs, byte-Range streaming
        of the original media file. Less metadata overhead than HLS but
        no adaptive bitrate.
      responses:
        "200":
          description: Full file
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "206":
          description: Partial content (Range request)

  /stream/{itemId}/session:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    delete:
      tags: [stream]
      summary: Stop a streaming session (frees transcode slot, deletes work dir)
      responses: { "204": { description: Stopped } }

  /stream/{itemId}/subtitles:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: List embedded subtitle tracks
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/SubtitleTrack" }

  /stream/{itemId}/subtitles/{trackIndex}:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - { name: trackIndex, in: path, required: true, schema: { type: integer } }
    get:
      tags: [stream]
      summary: Fetch one embedded subtitle track as WebVTT
      responses:
        "200":
          description: WebVTT
          content:
            text/vtt:
              schema: { type: string }

  /stream/{itemId}/subtitles/external:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - { name: lang, in: query, schema: { type: string }, description: ISO 639 language code }
    get:
      tags: [stream]
      summary: Search external subtitle providers (OpenSubtitles)
      responses:
        "200":
          description: Candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        file_id: { type: string }
                        language: { type: string }
                        release: { type: string }
                        rating: { type: number, format: float }

  /stream/{itemId}/subtitles/external/{fileId}:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - { name: fileId, in: path, required: true, schema: { type: string } }
    get:
      tags: [stream]
      summary: Download one external subtitle as WebVTT
      responses:
        "200":
          description: WebVTT
          content:
            text/vtt:
              schema: { type: string }

  # ─── User data ──────────────────────────────────────────────────────
  /me/continue-watching:
    get:
      tags: [user-data]
      summary: Items the user paused mid-way (filters near-complete + abandoned)
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 12, maximum: 50 } }
      responses:
        "200":
          description: Resume targets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ContinueWatchingEntry" }

  /me/favorites:
    get:
      tags: [user-data]
      summary: Items the user marked as favourite
      responses:
        "200":
          description: Favourites
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ItemSummary" }

  /me/next-up:
    get:
      tags: [user-data]
      summary: Next episode to watch per series the user is following
      responses:
        "200":
          description: Next-up entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ItemSummary" }

  /me/progress/{itemId}:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [user-data]
      summary: Read playback progress for an item
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Progress" }
    put:
      tags: [user-data]
      summary: Update playback progress
      description: |
        Idempotent — call as often as you like; the server takes the
        latest. Publishes a `user.progress.updated` event over SSE so
        other devices viewing this item refresh in real time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position_seconds]
              properties:
                position_seconds: { type: number, format: float }
                duration_seconds: { type: number, format: float, nullable: true }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Progress" }

  /me/progress/{itemId}/played:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    post:
      tags: [user-data]
      summary: Mark item as played
      responses: { "204": { description: Marked } }

  /me/progress/{itemId}/unplayed:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    post:
      tags: [user-data]
      summary: Mark item as unplayed (clears progress + played flag)
      responses: { "204": { description: Marked } }

  /me/progress/{itemId}/favorite:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string } }
    post:
      tags: [user-data]
      summary: Toggle favourite state
      responses:
        "200":
          description: New state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      is_favorite: { type: boolean }

  # ─── People ─────────────────────────────────────────────────────────
  /people/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [people]
      summary: Person detail with filmography
      responses:
        "200":
          description: Person
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/PersonDetail" }

  /people/{id}/thumb:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [people, images]
      summary: Person profile photo
      responses:
        "200":
          description: Image
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png:  { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }

  # ─── Studios ────────────────────────────────────────────────────────
  /studios:
    get:
      tags: [studios]
      summary: List studios with at least one item in the catalogue
      description: |
        Sorted by item_count desc on the way out. Drives the studio
        browse surface and the autocomplete that backs the studio
        click-through on item detail pages.
      responses:
        "200":
          description: Studios
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      studios:
                        type: array
                        items: { $ref: "#/components/schemas/StudioListEntry" }

  /studios/{slug}:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string }, description: "URL-safe slug — output of Slugify(name)" }
    get:
      tags: [studios]
      summary: Studio detail + catalogue items linked to it
      responses:
        "200":
          description: Studio
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/StudioDetail" }
        "404":
          description: Studio not found

  # ─── Movie collections (sagas) ──────────────────────────────────────
  /collections:
    get:
      tags: [collections]
      summary: List movie collections (Jellyfin-style sagas)
      description: |
        Every collection that has at least one member movie in the
        catalogue. Backed by TMDb belongs_to_collection records;
        ordered by member count desc.
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      collections:
                        type: array
                        items: { $ref: "#/components/schemas/CollectionListEntry" }

  /collections/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string }, description: "Canonical id `collection:<tmdb_id>`" }
    get:
      tags: [collections]
      summary: Collection detail + member movies in release order
      responses:
        "200":
          description: Collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/CollectionDetail" }
        "404":
          description: Collection not found

  # ─── Images ─────────────────────────────────────────────────────────
  /images/file/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string }, description: "Image row id (referenced from item.images[].id)" }
      - { name: w, in: query, schema: { type: integer }, description: "Optional width hint for server-side resizing (returns nearest cached variant)" }
    get:
      tags: [images]
      summary: Serve a stored image (poster / backdrop / banner / logo)
      responses:
        "200":
          description: Image
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png:  { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }

  # ─── Active sessions (user-facing "Tus dispositivos") ───────────────
  /me/sessions:
    get:
      tags: [auth]
      summary: List the caller's active auth sessions
      description: |
        One row per refresh token alive in the database. The `current`
        flag marks whichever session matches the caller's refresh
        cookie so the UI can warn before the operator revokes the
        device they are using right now.
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:             { type: string }
                        device_name:    { type: string }
                        device_id:      { type: string }
                        ip_address:     { type: string }
                        created_at:     { type: string, format: date-time }
                        last_active_at: { type: string, format: date-time }
                        expires_at:     { type: string, format: date-time }
                        current:        { type: boolean }

  /me/sessions/{id}:
    delete:
      tags: [auth]
      summary: Revoke one of the caller's auth sessions
      description: |
        Foreign session IDs (belonging to other users) return 404 to
        avoid leaking session existence. Revoking the caller's own
        current session also clears the auth cookies so the next
        request lands on /login cleanly.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Revoked }
        "404": { description: Session not found or not owned by caller }

  # ─── Per-user / per-profile mutations ───────────────────────────────
  # All four routes share the same authorisation matrix:
  #   admin    OR
  #   self     OR
  #   parent of the target profile
  # Foreign callers get 403. The PIN endpoint is the canonical
  # example — see internal/api/handlers/users.go.
  /users/{id}/display-name:
    put:
      tags: [users]
      summary: Rename a user / profile (label-only)
      description: |
        Changes the human-visible `display_name`. The username and
        parent_user_id stay put so logins, profile membership, and
        the deterministic FNV avatar colour remain stable.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties:
                display_name: { type: string, minLength: 1, maxLength: 64 }
      responses:
        "204": { description: Renamed }
        "400": { description: Validation error }
        "403": { description: "Caller is not admin, self, or parent of the target" }

  /users/{id}/avatar-color:
    put:
      tags: [users]
      summary: Set or clear the avatar colour override
      description: |
        Empty `avatar_color` clears the override → frontend falls
        back to the deterministic FNV-1a → palette helper. Non-empty
        must match one of the 14 known palette entries; anything
        else is a 400.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatar_color]
              properties:
                avatar_color: { type: string, description: "Hex like #RRGGBB or empty to clear" }
      responses:
        "204": { description: Updated }
        "400": { description: Hex not in palette }
        "403": { description: "Caller is not admin, self, or parent of the target" }

  /users/{id}/pin:
    put:
      tags: [users]
      summary: Set or clear the profile PIN
      description: |
        Empty `pin` clears the PIN; non-empty must be exactly four
        digits. The handler bcrypt-hashes the value before storage.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin: { type: string, pattern: "^[0-9]{4}$|^$" }
      responses:
        "204": { description: Updated }
        "400": { description: PIN format invalid }
        "403": { description: "Caller is not admin, self, or parent of the target" }

  /users/{id}/content-rating:
    put:
      tags: [users]
      summary: Set the per-profile content-rating cap
      description: |
        Empty string clears the cap (no restriction). Non-empty must
        be one of the MPAA / TV-* literals in the ranking table —
        anything below or equal to the cap is allowed; everything
        above is filtered from /items, /me/home/*, and the
        item-detail surfaces.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: string, description: "MPAA or TV literal, or empty to clear" }
      responses:
        "204": { description: Updated }
        "400": { description: Unknown rating literal }
        "403": { description: "Caller is not admin, self, or parent of the target" }

  # ─── Federation user surface ────────────────────────────────────────
  /me/peers:
    get:
      tags: [federation]
      summary: List paired peers visible to the calling user
      responses:
        "200":
          description: Peers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ConnectedPeer" }

  /me/peers/libraries:
    get:
      tags: [federation]
      summary: Unified flat list of every library every paired peer has shared with us
      description: |
        Fans out to every paired peer in parallel; offline peers are
        skipped (logged) so a single down peer doesn't 500 the
        endpoint. Powers the user's `/peers` landing grid.
      responses:
        "200":
          description: Libraries with peer attribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PeerLibrary" }

  /me/peers/search:
    parameters:
      - { name: q,     in: query, required: true,  schema: { type: string }, description: "Search query" }
      - { name: limit, in: query, required: false, schema: { type: integer, default: 10, maximum: 50 }, description: "Max hits per peer" }
    get:
      tags: [federation]
      summary: Federated full-text search across every paired peer
      description: |
        Fans out the query to every paired peer in parallel with a
        per-peer timeout (~2s). Peers that error or time out are
        skipped (logged) so a single misbehaving peer cannot blank
        the result page. Each hit carries the originating peer so
        the UI can render an origin badge and route Play through
        the right peer.
      responses:
        "200":
          description: Search hits with peer attribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      hits:
                        type: array
                        items:
                          type: object
                          properties:
                            peer_id:    { type: string }
                            peer_name:  { type: string }
                            library_id: { type: string }
                            id:         { type: string }
                            type:       { type: string }
                            title:      { type: string }
                            year:       { type: integer }
                            overview:   { type: string }
                            poster_url: { type: string }
        "400":
          description: q query parameter missing
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  /me/peers/recent:
    parameters:
      - { name: limit, in: query, required: false, schema: { type: integer, default: 12, maximum: 50 }, description: "Max hits per peer" }
    get:
      tags: [federation]
      summary: Most recently added items across every paired peer
      description: |
        Fans out a "what's new?" request to every paired peer in
        parallel and aggregates the results with origin attribution.
        Same fan-out posture as `/me/peers/search` (per-peer 2 s
        timeout, errors silently skipped, per-peer fairness cap).
        Powers the home page's "Recently added on peers" rail.
      responses:
        "200":
          description: Recent hits with peer attribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      hits:
                        type: array
                        items:
                          type: object
                          properties:
                            peer_id:    { type: string }
                            peer_name:  { type: string }
                            library_id: { type: string }
                            id:         { type: string }
                            type:       { type: string }
                            title:      { type: string }
                            year:       { type: integer }
                            overview:   { type: string }
                            poster_url: { type: string }

  /me/peers/continue-watching:
    parameters:
      - { name: limit, in: query, required: false, schema: { type: integer, default: 20, maximum: 100 } }
    get:
      tags: [federation]
      summary: Cross-peer Continue Watching rail
      description: |
        Returns the user's in-progress federated items, ordered by
        most-recently-played. Backed by the local
        `federation_progress` table (see migration 028) joined with
        the catalog cache, so this is a single local query -- no
        peer fan-out. Filters mirror the local Continue Watching
        rail: completed=false, position>0, less than 90% played
        (when duration is known), and the owning peer is still
        paired.
      responses:
        "200":
          description: Cross-peer in-progress items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:             { type: string, description: "Remote item id on the peer" }
                        peer_id:        { type: string }
                        peer_name:      { type: string }
                        library_id:     { type: string }
                        type:           { type: string }
                        title:          { type: string }
                        year:           { type: integer }
                        overview:       { type: string }
                        poster_url:     { type: string }
                        position_ticks: { type: integer, format: int64 }
                        duration_ticks: { type: integer, format: int64 }
                        percentage:     { type: number, format: double }
                        last_played_at: { type: string, format: date-time }

  /me/peers/{peerID}/items/{itemId}/progress:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: itemId, in: path, required: true, schema: { type: string }, description: "Remote item id on the peer" }
    get:
      tags: [federation]
      summary: Read playback state for one federated item
      description: |
        Returns the user's stored position for `(peerID, itemId)`.
        Returns the all-zero default when nothing has been recorded
        yet -- the player treats that as "start from 0" without
        special-casing 404.
      responses:
        "200":
          description: Stored position (zero-valued when absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      item_id:        { type: string }
                      peer_id:        { type: string }
                      position_ticks: { type: integer, format: int64 }
                      duration_ticks: { type: integer, format: int64 }
                      completed:      { type: boolean }
                      last_played_at: { type: string, format: date-time }
    post:
      tags: [federation]
      summary: Update playback state for one federated item
      description: |
        Upserts the user's position for `(peerID, itemId)` into
        `federation_progress`. `duration_ticks` is optional on the
        first save (the player learns it from the manifest after a
        few segments); the upsert preserves a previously-stored
        non-zero duration when 0 is passed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position_ticks]
              properties:
                position_ticks: { type: integer, format: int64 }
                duration_ticks: { type: integer, format: int64 }
                completed:      { type: boolean }
      responses:
        "204":
          description: Progress saved

  /me/peers/{peerID}/libraries:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
    get:
      tags: [federation]
      summary: Libraries one specific peer has shared with us
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PeerLibrary" }

  /me/peers/{peerID}/libraries/{libraryID}/items:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: libraryID, in: path, required: true, schema: { type: string } }
      - { name: offset, in: query, schema: { type: integer, default: 0 } }
      - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
    get:
      tags: [federation]
      summary: Browse items in a peer's library (read-through cache, falls back to stale on offline)
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PeerItem" }
                  total: { type: integer }
                  from_cache: { type: boolean, description: "true when served from local cache (peer offline or fresh-enough)" }

  /me/peers/{peerID}/items/{itemId}/poster:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: itemId, in: path, required: true, schema: { type: string } }
    get:
      tags: [federation]
      summary: Proxied primary poster for a federated item
      description: |
        Streams the bytes of the item's primary poster from the peer
        through this server's origin. The user's browser only ever
        contacts this server -- the peer's hostname stays invisible.
        The origin re-verifies the calling peer (this server) still
        holds the `can_browse` scope on the item's library on every
        request, so a peer that lost a share since the catalog was
        cached locally cannot keep pulling artwork.

        Cache-Control + ETag headers from the origin pass through, so
        a re-render of the same grid hits a 304 in the browser.
      responses:
        "200":
          description: Image bytes (Content-Type matches the source — usually `image/jpeg` or `image/webp`)
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
            image/png:  { schema: { type: string, format: binary } }
        "304": { description: Not modified (ETag matched If-None-Match) }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Peer unreachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /me/peers/{peerID}/libraries/{libraryID}/refresh:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: libraryID, in: path, required: true, schema: { type: string } }
    post:
      tags: [federation]
      summary: Force a cache refresh for one peer library
      responses: { "204": { description: Cache cleared (next browse call hits live) } }

  # ─── Federation streaming (user-facing proxy) ───────────────────────
  #
  # When a user clicks play on a peer's item, their client only ever
  # talks to OUR server. We forward to the peer with our peer JWT and
  # stream the bytes back. The peer's hostname, peer JWT, and CORS
  # posture stay invisible to the client.
  #
  # The HLS master playlist returned by the peer uses relative variant
  # URLs scoped to /peer/stream/session/{id}/, so once the player
  # loads our master URL its subsequent quality + segment requests
  # come back here automatically -- no manifest rewriting on our side.
  /me/peers/{peerID}/stream/{itemId}/session:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: itemId, in: path, required: true, schema: { type: string } }
      - $ref: "#/components/parameters/ClientCapabilitiesHeader"
    post:
      tags: [federation, stream]
      summary: Start a streaming session for a peer's item
      description: |
        Forwards the user's declared client capabilities to the peer's
        own `stream.Manager` so the DirectPlay/DirectStream/Transcode
        decision uses our caps end-to-end. Returns a `master_playlist_url`
        scoped to the proxy under our origin -- the player loads that
        URL and never sees the peer's hostname.
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [strategy, master_playlist_url, peer_session_id]
                    properties:
                      strategy: { type: string, enum: [direct_play, direct_stream, transcode] }
                      master_playlist_url: { type: string, description: "Same-origin path the HLS player should load" }
                      peer_session_id: { type: string, description: "Opaque session id assigned by the peer" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Peer unreachable or rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /me/peers/{peerID}/stream/session/{sessionId}/master.m3u8:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
    get:
      tags: [federation, stream]
      summary: Proxied HLS master playlist for a federated session
      responses:
        "200":
          description: Master playlist
          content:
            application/vnd.apple.mpegurl: { schema: { type: string } }

  /me/peers/{peerID}/stream/session/{sessionId}/subtitles:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
    get:
      tags: [federation, stream]
      summary: List embedded subtitle tracks of a federated session
      description: |
        Returns the same shape as `/stream/{itemId}/subtitles` for local
        items. Federated master playlists are variant-only (no
        EXT-X-MEDIA SUBTITLES across the federation boundary), so the
        player fetches the track list out-of-band and rides a `<track>`
        element pointing at `/me/peers/.../subtitles/{trackIndex}` for
        the picked one.
      responses:
        "200":
          description: Tracks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/SubtitleTrack" }

  /me/peers/{peerID}/stream/session/{sessionId}/subtitles/{trackIndex}:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
      - { name: trackIndex, in: path, required: true, schema: { type: integer } }
    get:
      tags: [federation, stream]
      summary: Fetch one federated subtitle track as WebVTT
      responses:
        "200":
          description: WebVTT
          content:
            text/vtt:
              schema: { type: string }

  /me/peers/{peerID}/stream/session/{sessionId}/{quality}/index.m3u8:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
      - { name: quality, in: path, required: true, schema: { type: string }, description: "Profile name (e.g. `1080p`, `720p`)" }
    get:
      tags: [federation, stream]
      summary: Proxied per-quality HLS manifest
      responses:
        "200":
          description: Quality manifest
          content:
            application/vnd.apple.mpegurl: { schema: { type: string } }
        "503":
          description: Manifest still being generated upstream; retry shortly

  /me/peers/{peerID}/stream/session/{sessionId}/{quality}/{segment}:
    parameters:
      - { name: peerID, in: path, required: true, schema: { type: string } }
      - { name: sessionId, in: path, required: true, schema: { type: string } }
      - { name: quality, in: path, required: true, schema: { type: string } }
      - { name: segment, in: path, required: true, schema: { type: string }, description: "Segment filename (e.g. `segment00012.ts`)" }
    get:
      tags: [federation, stream]
      summary: Proxied HLS segment from a federated session
      responses:
        "200":
          description: MPEG-TS segment
          content:
            video/mp2t: { schema: { type: string, format: binary } }

  # ─── Live TV (IPTV) ──────────────────────────────────────────────────
  #
  # Channels live inside an IPTV library (`content_type: livetv`). Browse
  # and EPG are read-only for any authenticated user with library access;
  # mutations (channel disable/reset-health, M3U/EPG refresh, scheduled
  # jobs, EPG sources) are admin-only and intentionally out of this spec.
  #
  # Playback dispatch:
  #   - HLS upstreams → `/channels/{id}/stream` proxies them (passthrough).
  #   - MPEG-TS upstreams (typical of Xtream Codes) → that same endpoint
  #     302-redirects to `/channels/{id}/hls/index.m3u8`, which spawns a
  #     per-channel ffmpeg transmux session (`-c copy`, low CPU). The
  #     manifest references segments served by `/hls/{segment}`.
  /libraries/{id}/channels:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: active, in: query, schema: { type: boolean, default: true }, description: "Set false to include disabled channels" }
    get:
      tags: [livetv, browse]
      summary: List channels in an IPTV library
      responses:
        "200":
          description: Channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Channel" }

  /libraries/{id}/channels/groups:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [livetv]
      summary: List distinct group_name values for the library's channels
      description: Used by the channel grid to populate the group filter.
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }

  /channels/{channelId}:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    get:
      tags: [livetv]
      summary: Channel detail with the currently-airing EPG program when known
      responses:
        "200":
          description: Channel
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/ChannelDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /channels/{channelId}/stream:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    get:
      tags: [livetv, stream]
      summary: Play a channel (HLS passthrough or 302 to transmux)
      description: |
        Dispatches by upstream format:

        - Upstream is HLS (`*.m3u8`) → server proxies the manifest with
          segment URLs rewritten through `/proxy?url=` so auth + the
          upstream rewriter still apply. `Content-Type: application/vnd.apple.mpegurl`.
        - Upstream is anything else (typically raw MPEG-TS over HTTP) →
          `302 Found` to `/channels/{channelId}/hls/index.m3u8` where a
          per-channel ffmpeg transmux session has been (or will be)
          spawned.
      responses:
        "200":
          description: HLS manifest (passthrough)
          content:
            application/vnd.apple.mpegurl: { schema: { type: string } }
        "302": { description: "Redirected to the transmux HLS endpoint" }
        "404":
          description: Channel inactive or not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /channels/{channelId}/proxy:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
      - { name: url, in: query, required: true, schema: { type: string, format: uri }, description: "Absolute upstream URL to proxy. Server validates against SSRF and the calling user's library ACL before proxying." }
    get:
      tags: [livetv, stream]
      summary: Same-origin proxy for an HLS sub-playlist or segment
      description: |
        Used by the player when the upstream HLS manifest references
        absolute URLs the browser CSP can't load directly. The handler
        re-fetches `url` server-side and streams the bytes back. SSRF-
        protected: rejects loopback / link-local / RFC1918 destinations.
      responses:
        "200":
          description: Proxied bytes (HLS sub-playlist or MPEG-TS segment)
          content:
            application/vnd.apple.mpegurl: { schema: { type: string } }
            video/mp2t: { schema: { type: string, format: binary } }

  /channels/{channelId}/hls/index.m3u8:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    get:
      tags: [livetv, stream]
      summary: Live HLS manifest from the per-channel ffmpeg transmux session
      description: |
        First hit spawns the session if none is running; subsequent hits
        reuse it. Always returns no-cache so the player sees fresh segment
        windows. Returns 501 NOT_IMPLEMENTED if the server was deployed
        without ffmpeg (transmux disabled).
      responses:
        "200":
          description: HLS manifest
          content:
            application/vnd.apple.mpegurl: { schema: { type: string } }
        "501":
          description: Transmux is disabled on this deployment (no ffmpeg)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /channels/{channelId}/hls/{segment}:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
      - { name: segment, in: path, required: true, schema: { type: string }, description: "Segment filename (e.g. `seg-12.ts`) as referenced by the manifest" }
    get:
      tags: [livetv, stream]
      summary: Single HLS segment from the transmux session
      responses:
        "200":
          description: MPEG-TS segment
          content:
            video/mp2t: { schema: { type: string, format: binary } }
        "404":
          description: Session expired; reload the manifest to resume

  /channels/{channelId}/logo:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    get:
      tags: [livetv, images]
      summary: Same-origin proxy for the channel's `tvg-logo`
      description: |
        Mirrors the upstream image to disk and serves from the local
        cache so a strict `img-src 'self'` CSP can stay locked. 404 when
        the upstream is unfetchable; the client should fall back to the
        deterministic initials placeholder shipped in the channel DTO.
      responses:
        "200":
          description: Logo
          content:
            image/png:  { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }

  /channels/{channelId}/schedule:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
      - { name: from, in: query, schema: { type: string }, description: "RFC3339 timestamp OR integer hours offset from now (negative = past)" }
      - { name: to, in: query, schema: { type: string }, description: "RFC3339 timestamp OR integer hours offset from now" }
    get:
      tags: [livetv]
      summary: EPG schedule for one channel
      responses:
        "200":
          description: Programs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/EPGProgram" }

  /channels/{channelId}/watch:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    post:
      tags: [livetv, user-data]
      summary: Beacon — record that the user started watching this channel
      description: |
        Fire-and-forget from the player on tune-in. Updates the
        per-user "continue watching" rail (`GET /me/channels/continue-watching`).
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      channel_id: { type: string }
                      last_watched_at: { type: string, format: date-time }

  /channels/{channelId}/playback-failure:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    post:
      tags: [livetv]
      summary: Beacon — report a playback failure for a channel
      description: |
        Fire-and-forget. The server increments the channel's consecutive-
        failure counter, which feeds the `health_status` field on the
        Channel DTO and the admin "Sin señal" panel.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, description: "Optional short label, e.g. `manifest_404`, `decode_error`" }
      responses: { "204": { description: Recorded } }

  /channels/schedule:
    get:
      tags: [livetv]
      summary: Bulk EPG schedule for multiple channels (GET — small libraries)
      description: |
        Convenience for ad-hoc curl/debugging. Production clients should
        prefer the POST variant — a query string with ~250 channel UUIDs
        already trips a `414` on common nginx defaults.
      parameters:
        - { name: channels, in: query, schema: { type: string }, description: "Comma-separated channel ids" }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
      responses:
        "200":
          description: Per-channel program lists keyed by channel id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkScheduleResponse" }
    post:
      tags: [livetv]
      summary: Bulk EPG schedule (preferred — POST body, capped at 5000 channels)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channels]
              properties:
                channels:
                  type: array
                  items: { type: string }
                  description: "Channel ids; capped at 5000 per request"
                from: { type: string, description: "RFC3339 or hours-offset" }
                to:   { type: string, description: "RFC3339 or hours-offset" }
      responses:
        "200":
          description: Per-channel program lists keyed by channel id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkScheduleResponse" }

  /me/channels/continue-watching:
    get:
      tags: [livetv, user-data]
      summary: Most recently watched channels for the caller
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 10, maximum: 20 } }
      responses:
        "200":
          description: Recently watched channels (newest first), enriched with `last_watched_at`
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Channel"
                        - type: object
                          properties:
                            last_watched_at: { type: string, format: date-time }

  /favorites/channels:
    get:
      tags: [livetv, user-data]
      summary: List the caller's favorite channels (full DTO)
      responses:
        "200":
          description: Favorite channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Channel" }

  /favorites/channels/ids:
    get:
      tags: [livetv, user-data]
      summary: List the caller's favorite channel ids only (light payload for hydration)
      responses:
        "200":
          description: Favorite channel ids
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }

  /favorites/channels/{channelId}:
    parameters:
      - { name: channelId, in: path, required: true, schema: { type: string } }
    put:
      tags: [livetv, user-data]
      summary: Mark a channel as favorited (idempotent)
      responses:
        "200":
          description: Favorited
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      channel_id: { type: string }
                      is_favorite: { type: boolean, enum: [true] }
    delete:
      tags: [livetv, user-data]
      summary: Unfavorite a channel (idempotent — no error if it wasn't a favorite)
      responses:
        "200":
          description: Unfavorited
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      channel_id: { type: string }
                      is_favorite: { type: boolean, enum: [false] }

  # ─── Home (per-user layout + discovery rails) ───────────────────────
  #
  # `/me/home/layout` is the user's customisable home order — read on
  # mount, written when the user reorders rails. Trending and live-now
  # are first-class rails the layout references and the client fetches
  # in parallel.
  /me/home/layout:
    get:
      tags: [home, identity]
      summary: Current user's home layout
      description: |
        Returns a stored layout if one was saved, otherwise a default
        synthesised from the user's accessible libraries (each
        movie/series library gets a `latest_in_library` rail; livetv
        libraries are covered by the global `live_now` rail). Library
        names are server-resolved so the client renders rail titles
        without a follow-up call.
      responses:
        "200":
          description: Layout
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/HomeLayout" }
    put:
      tags: [home, identity]
      summary: Persist the caller's home layout
      description: |
        The server normalises on write: unknown section types are
        dropped; `latest_in_library` sections referencing libraries the
        caller can't see are dropped (defence in depth); `library_name`
        is read-only and stripped. The persisted, normalised layout is
        echoed back so the client can rehydrate without a follow-up GET.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HomeLayout" }
      responses:
        "200":
          description: Persisted layout (normalised)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/HomeLayout" }

  /me/home/trending:
    get:
      tags: [home]
      summary: Top items watched across all users in the trailing 7-day window
      description: |
        Scoped to libraries the caller can see. Enriched with poster /
        backdrop / logo paths (same shape as `/items/latest`) and with
        overview + genres so trending cards can render the same chips
        as Continue Watching without a follow-up detail fetch.
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 12, maximum: 30 } }
      responses:
        "200":
          description: Trending items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/TrendingItem" }
                      total: { type: integer }

  /me/home/recommended:
    get:
      tags: [home]
      summary: Genre-affinity recommendations the caller has not watched
      description: |
        Picks unwatched movies / series that share genres with the
        items the caller most actively watches. Each entry carries
        `recommended_because.genres` so the frontend can render a
        "Porque te gusta {{genre}}" subtitle. Returns an empty list
        for cold-start users (no engagement history yet).
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 5, maximum: 20 } }
      responses:
        "200":
          description: Recommended items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/RecommendedItem" }
                      total: { type: integer }

  /me/home/because-you-watched:
    get:
      tags: [home]
      summary: Because-you-watched rail seeded by the latest completed watch
      description: |
        Picks the caller's most recent COMPLETED watch as the seed
        (episode completes fold to the parent series so the rail
        title reads "Porque viste Breaking Bad", not an episode
        title) and returns up to `limit` unwatched movies / series
        that share genres with it. Returns `{seed: null, items: []}`
        for cold-start users; the rail self-hides on the
        frontend in that case.

        Per-profile content cap is honoured with a 2x headroom so
        kid profiles don't end up with an empty rail just because
        the seed's matches happen to be R-heavy.
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 12, maximum: 30 } }
      responses:
        "200":
          description: Recommendations + seed metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      seed:
                        nullable: true
                        type: object
                        properties:
                          id:         { type: string }
                          type:       { type: string, enum: [movie, series] }
                          title:      { type: string }
                          year:       { type: integer }
                          library_id: { type: string }
                          poster_url: { type: string }
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/RecommendedItem" }

  /me/home/live-now:
    get:
      tags: [home, livetv]
      summary: Up to N live channels with the program currently airing on each
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 5, maximum: 20 } }
      responses:
        "200":
          description: Live-now entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/LiveNowEntry" }

  # ─── Meta ───────────────────────────────────────────────────────────
  /openapi.yaml:
    get:
      tags: [meta]
      summary: This OpenAPI 3.0.3 specification (self-description)
      description: |
        Served public on purpose — clients fetch the spec before they
        can authenticate, and the document itself contains no secrets.
        Backed by `//go:embed`, so the spec ships in the same binary
        whose surface it describes (no drift from a misconfigured
        volume mount). `ETag`-aware: re-fetch with `If-None-Match` to
        get a `304 Not Modified` and skip the body transfer.
      security: []
      responses:
        "200":
          description: OpenAPI spec
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string }, description: "`public, max-age=3600`" }
          content:
            application/yaml:
              schema: { type: string }
        "304": { description: Not modified (matched If-None-Match) }
    head:
      tags: [meta]
      summary: Spec metadata only (Content-Length + ETag, no body)
      security: []
      responses:
        "200":
          description: Headers only
          headers:
            ETag:           { schema: { type: string } }
            Content-Length: { schema: { type: integer } }
            Cache-Control:  { schema: { type: string } }

# ════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `/auth/login`, `/auth/refresh`, or `/auth/device/poll`.
        Send as `Authorization: Bearer <access_token>`. Tokens expire in
        15 min by default — refresh proactively or on the first 401.

  parameters:
    ClientCapabilitiesHeader:
      name: X-Hubplay-Client-Capabilities
      in: header
      required: false
      schema: { type: string }
      description: |
        Semicolon-separated key=value-list of decoder capabilities. Drives
        the DirectPlay/DirectStream/Transcode decision. Format:
        `video=h264,hevc; audio=aac,eac3; container=mp4,mkv`.
        Header absent → server falls back to conservative web-browser defaults.

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource does not exist (or is hidden by ACL — both 404 by design to avoid existence leak)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    # ─── Wrappers ────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: "Stable machine-readable identifier", example: "INVALID_CREDENTIALS" }
            message: { type: string, description: "Human-readable English; surface via i18n in your client" }
            hint: { type: string, description: "Optional remediation pointer" }
            details: { type: object, additionalProperties: true }
            request_id: { type: string, description: "Correlation id for server logs" }

    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string, enum: [ok] }
            version: { type: string }
            uptime_seconds: { type: integer }

    AuthTokenEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/AuthToken" }

    AuthToken:
      type: object
      required: [access_token, refresh_token, expires_at, user]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_at: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/User" }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        device_name: { type: string, example: "Chrome on macOS" }
        device_id: { type: string, description: "Stable per-device identifier; defaults to a server-side UUID if omitted" }

    DeviceStartEnvelope:
      type: object
      properties:
        data:
          type: object
          required: [device_code, user_code, verification_url, expires_in, interval]
          properties:
            device_code: { type: string, description: "Opaque secret kept by the polling device" }
            user_code:
              type: string
              description: "Operator-typed code, dash-formatted (`ABCD-EFGH`)"
              example: "ABCD-EFGH"
            verification_url: { type: string, format: uri, description: "Where to send the operator (typically `<base_url>/link`)" }
            verification_uri: { type: string, format: uri, description: "RFC 8628 alias of `verification_url`" }
            expires_in: { type: integer, description: "Seconds until the code pair becomes invalid" }
            interval: { type: integer, description: "Recommended polling cadence in seconds" }

    UserEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/User" }

    User:
      type: object
      required: [id, username, role, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [user, admin] }
        avatar_path: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    # ─── Library + items ─────────────────────────────────────────────
    Library:
      type: object
      required: [id, name, content_type]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        content_type: { type: string, enum: [movies, shows, music, livetv] }
        item_count: { type: integer }

    PaginatedItemsEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ItemSummary" }
            total: { type: integer }
            offset: { type: integer }
            limit: { type: integer }

    ItemSummary:
      type: object
      required: [id, type, title]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [movie, series, season, episode] }
        title: { type: string }
        year: { type: integer, nullable: true }
        rating: { type: number, format: float, nullable: true }
        runtime_minutes: { type: integer, nullable: true }
        poster_image_id: { type: string, nullable: true, description: "Use with `/images/file/{id}`" }
        backdrop_image_id: { type: string, nullable: true }
        poster_blurhash: { type: string, nullable: true, description: "BlurHash placeholder for instant render" }
        backdrop_colors:
          type: object
          nullable: true
          properties:
            vibrant: { type: string, example: "rgb(180, 60, 90)" }
            muted: { type: string }
        # Series/season/episode hierarchy
        parent_id: { type: string, format: uuid, nullable: true }
        season_number: { type: integer, nullable: true }
        episode_number: { type: integer, nullable: true }
        # User state (when authenticated)
        user_data:
          type: object
          nullable: true
          properties:
            played: { type: boolean }
            position_seconds: { type: number, format: float }
            is_favorite: { type: boolean }

    ItemDetail:
      allOf:
        - $ref: "#/components/schemas/ItemSummary"
        - type: object
          properties:
            overview: { type: string }
            tagline: { type: string }
            studio: { type: string }
            studio_logo_url:
              type: string
              description: "Absolute URL of the studio brand-mark image (empty when no logo on file)"
            genres:
              type: array
              items: { type: string }
            external_ids:
              type: object
              additionalProperties: { type: string }
              description: "Provider-keyed (e.g. `tmdb`, `imdb`) with the upstream id as value"
            images:
              type: array
              items: { $ref: "#/components/schemas/Image" }
            media_streams:
              type: array
              items: { $ref: "#/components/schemas/MediaStream" }
            chapters:
              type: array
              items: { $ref: "#/components/schemas/Chapter" }
            people:
              type: array
              items: { $ref: "#/components/schemas/CreditEntry" }

    Image:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [poster, backdrop, banner, logo, thumb] }
        is_primary: { type: boolean }
        is_locked: { type: boolean, description: "Manual override; protected from refresh sweeps" }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        blurhash: { type: string, nullable: true }

    MediaStream:
      type: object
      required: [type, codec]
      properties:
        type: { type: string, enum: [video, audio, subtitle] }
        codec: { type: string, example: "hevc" }
        index: { type: integer }
        language: { type: string, nullable: true }
        title: { type: string, nullable: true }
        is_default: { type: boolean }
        is_forced: { type: boolean }
        bitrate: { type: integer, nullable: true }
        # Video-only
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        # Audio-only
        channels: { type: integer, nullable: true }
        channel_layout: { type: string, nullable: true, example: "5.1" }

    Chapter:
      type: object
      required: [start_seconds, title]
      properties:
        start_seconds: { type: number, format: float }
        title: { type: string }

    CreditEntry:
      type: object
      required: [person_id, name, role]
      properties:
        person_id: { type: string, format: uuid }
        name: { type: string }
        role: { type: string, enum: [actor, director, writer, producer, composer] }
        character: { type: string, nullable: true }
        sort_order: { type: integer }
        thumb_url: { type: string, nullable: true, description: "Same-origin URL — proxied via /people/{id}/thumb" }

    PersonDetail:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        biography: { type: string }
        profile_url: { type: string, nullable: true }
        filmography:
          type: array
          items: { $ref: "#/components/schemas/ItemSummary" }

    # ─── Studios ─────────────────────────────────────────────────────
    StudioListEntry:
      type: object
      required: [id, name, slug, item_count]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string, description: "URL-safe key for /studios/{slug}" }
        logo_url: { type: string, description: "Optional — TMDb production-company brand mark" }
        item_count: { type: integer }

    StudioItemRef:
      type: object
      required: [id, type, title]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [movie, series] }
        title: { type: string }
        year: { type: integer, nullable: true }
        poster_url: { type: string, nullable: true }

    StudioDetail:
      type: object
      required: [id, name, slug, items]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        logo_url: { type: string, nullable: true }
        tmdb_id: { type: integer, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/StudioItemRef" }

    # ─── Movie collections (sagas) ───────────────────────────────────
    CollectionListEntry:
      type: object
      required: [id, name, item_count]
      properties:
        id: { type: string, description: "Canonical id `collection:<tmdb_id>`" }
        name: { type: string }
        poster_url: { type: string, nullable: true }
        backdrop_url: { type: string, nullable: true }
        item_count: { type: integer }

    CollectionDetail:
      type: object
      required: [id, tmdb_id, name, items]
      properties:
        id: { type: string }
        tmdb_id: { type: integer }
        name: { type: string }
        overview: { type: string, nullable: true }
        poster_url: { type: string, nullable: true }
        backdrop_url: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/StudioItemRef" }

    # ─── Stream ──────────────────────────────────────────────────────
    StreamInfo:
      type: object
      required: [strategy, master_playlist_url]
      properties:
        strategy: { type: string, enum: [direct_play, direct_stream, transcode] }
        master_playlist_url: { type: string, format: uri }
        direct_url: { type: string, format: uri, nullable: true, description: "Set when strategy=direct_play; serves the original file with Range support" }
        decision_reason: { type: string, description: "Human-readable why-this-strategy explanation" }
        media_streams:
          type: array
          items: { $ref: "#/components/schemas/MediaStream" }

    SubtitleTrack:
      type: object
      properties:
        index: { type: integer }
        codec: { type: string }
        language: { type: string }
        title: { type: string }
        default: { type: boolean }
        forced: { type: boolean }

    # ─── User data ───────────────────────────────────────────────────
    Progress:
      type: object
      required: [item_id, position_seconds, played]
      properties:
        item_id: { type: string, format: uuid }
        position_seconds: { type: number, format: float }
        duration_seconds: { type: number, format: float, nullable: true }
        played: { type: boolean }
        is_favorite: { type: boolean }
        updated_at: { type: string, format: date-time }

    ContinueWatchingEntry:
      allOf:
        - $ref: "#/components/schemas/ItemSummary"
        - type: object
          properties:
            position_seconds: { type: number, format: float }
            updated_at: { type: string, format: date-time }

    # ─── Federation ──────────────────────────────────────────────────
    ConnectedPeer:
      type: object
      properties:
        id: { type: string, format: uuid }
        server_uuid: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [paired, revoked, pending] }
        last_seen_at: { type: string, format: date-time, nullable: true }
        fingerprint: { type: string, description: "16 hex chars in groups of 4 (e.g. `a8f3:k2m9:x4p1:c7e2`)" }

    PeerLibrary:
      type: object
      properties:
        peer:
          $ref: "#/components/schemas/ConnectedPeer"
        library:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            content_type: { type: string, enum: [movies, shows, music, livetv] }
            scopes:
              type: object
              properties:
                can_browse: { type: boolean }
                can_play: { type: boolean }
                can_download: { type: boolean }
                can_livetv: { type: boolean }

    PeerItem:
      type: object
      required: [id, type, title]
      properties:
        id: { type: string, description: "Remote item id (opaque to us)" }
        type: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        overview: { type: string }
        poster_url: { type: string, nullable: true, description: "Proxied via origin — never the peer's URL directly" }

    # ─── Live TV ─────────────────────────────────────────────────────
    Channel:
      type: object
      required: [id, name, library_id, health_status]
      properties:
        id: { type: string }
        name: { type: string }
        number: { type: integer, description: "1-based channel number from the M3U `tvg-chno`; 0 when the upstream omits it" }
        group: { type: string, description: "Raw M3U `group-title`. Historical alias of `group_name` — prefer the latter" }
        group_name: { type: string }
        category:
          type: string
          description: |
            Canonical, UI-stable classification derived from `group_name` via
            an internal keyword table (sports, news, kids, movies, …).
            Computed per request so keyword-table changes apply instantly
            to existing libraries without a rescan.
        logo_url:
          type: string
          description: |
            Same-origin proxy URL (`/api/v1/channels/{id}/logo`). Empty
            when the channel has no upstream logo. The endpoint may 404
            even when this is set; clients should fall back to the
            initials placeholder on `<img onerror>`.
        logo_initials: { type: string, description: "Deterministic 1–2 character placeholder. Always populated" }
        logo_bg: { type: string, description: "Hex/rgb background for the placeholder" }
        logo_fg: { type: string, description: "Hex/rgb foreground for the placeholder" }
        stream_url: { type: string, description: "Convenience: ready-to-fetch `/api/v1/channels/{id}/stream`. Omitted on the detail endpoint" }
        library_id: { type: string, format: uuid }
        tvg_id: { type: string }
        language: { type: string }
        country: { type: string, description: "ISO 3166-1 alpha-2 when known, raw M3U value otherwise" }
        is_active: { type: boolean }
        added_at: { type: string, format: date-time }
        health_status:
          type: string
          enum: [ok, degraded, dead]
          description: |
            Derived from the channel's consecutive-failures counter.
            `ok` = healthy or never failed; `degraded` = 1..N-1 recent
            failures (still surfaced); `dead` = ≥ N failures (the
            "Sin señal" bucket). N is the server's `UnhealthyThreshold`.

    ChannelDetail:
      allOf:
        - $ref: "#/components/schemas/Channel"
        - type: object
          properties:
            now_playing:
              type: object
              nullable: true
              description: "Currently-airing EPG program when one is known"
              properties:
                title: { type: string }
                description: { type: string }
                category: { type: string }
                start_time: { type: string, format: date-time }
                end_time: { type: string, format: date-time }

    EPGProgram:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        icon_url: { type: string, nullable: true }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }

    BulkScheduleResponse:
      type: object
      description: |
        Per-channel program lists keyed by channel id. Channels the
        caller doesn't have ACL for are silently dropped from the keys
        rather than 403'ing the whole request.
      properties:
        data:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/EPGProgram" }

    # ─── Home ────────────────────────────────────────────────────────
    HomeLayout:
      type: object
      required: [version, sections]
      properties:
        version: { type: integer, description: "Document version; bumped when the persisted shape changes" }
        sections:
          type: array
          items: { $ref: "#/components/schemas/HomeSection" }

    HomeSection:
      type: object
      required: [id, type, visible]
      properties:
        id: { type: string, description: "Stable id for drag-reorder; server synthesises one if the client omits it on PUT" }
        type:
          type: string
          enum: [continue_watching, next_up, trending, live_now, latest_in_library]
        library_id: { type: string, format: uuid, description: "Set only when `type=latest_in_library`" }
        library_name: { type: string, description: "Read-only — server resolves from `library_id` on GET, ignored on PUT" }
        visible: { type: boolean }

    TrendingItem:
      type: object
      required: [id, type, title]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [movie, series, episode] }
        title: { type: string }
        year: { type: integer, nullable: true }
        community_rating: { type: number, format: float, nullable: true }
        library_id: { type: string, format: uuid }
        play_count: { type: integer, description: "Plays across all users in the 7-day window" }
        poster_url: { type: string, nullable: true }
        backdrop_url: { type: string, nullable: true }
        logo_url: { type: string, nullable: true }
        poster_blurhash: { type: string, nullable: true }
        overview: { type: string }
        genres:
          type: array
          items: { type: string }

    RecommendedItem:
      type: object
      required: [id, type, title, recommended_because]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [movie, series] }
        title: { type: string }
        year: { type: integer, nullable: true }
        community_rating: { type: number, format: float, nullable: true }
        library_id: { type: string, format: uuid }
        poster_url: { type: string, nullable: true }
        backdrop_url: { type: string, nullable: true }
        logo_url: { type: string, nullable: true }
        poster_blurhash: { type: string, nullable: true }
        overview: { type: string }
        genres:
          type: array
          items: { type: string }
        recommended_because:
          type: object
          required: [genres]
          properties:
            genres:
              type: array
              description: Genres this item shares with the caller's most-watched
              items: { type: string }

    LiveNowEntry:
      type: object
      required: [channel_id, channel_name, library_id]
      properties:
        channel_id: { type: string }
        channel_name: { type: string }
        library_id: { type: string, format: uuid }
        library_name: { type: string }
        channel_logo: { type: string, nullable: true, description: "Same-origin proxy URL; absent when the channel has no logo" }
        logo_initials: { type: string, description: "Deterministic 1-3 letter abbreviation derived from channel_name; matches the channelDTO recipe so home and /live-tv share placeholder identity" }
        logo_bg: { type: string, description: "Hex colour for the placeholder tile background" }
        logo_fg: { type: string, description: "Hex colour for the placeholder initials" }
        program_title: { type: string, nullable: true }
        program_start: { type: string, format: date-time, nullable: true }
        program_end: { type: string, format: date-time, nullable: true }
        program_icon: { type: string, nullable: true }

# Apply bearer auth to every operation by default. Endpoints that allow
# anonymous access opt out via `security: []` (auth flow start, /health,
# /federation/info, /peer/handshake — only the first is in this spec).
security:
  - bearerAuth: []
